name: Check firmware updates

on:
  workflow_dispatch:
  schedule:
    - cron: "0 12 * * *"

permissions:
  contents: write
  pull-requests: write

jobs:
  check:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check and apply firmware updates
        shell: pwsh
        run: .\tools\check-updates.ps1 -Apply

      - name: Validate repository
        shell: pwsh
        run: .\tools\test.ps1

      - name: Create pull request
        uses: peter-evans/create-pull-request@v8
        with:
          branch: automated/firmware-updates
          delete-branch: true
          title: Add latest controller firmware
          commit-message: Add latest controller firmware
          body: |
            Automated firmware update from Sony fwupdater info.json.

            This PR was generated by the scheduled firmware update workflow.
